name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]   # main is covered by the release workflow's build

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install

      - name: Typecheck server
        run: npm run typecheck --workspace server

      - name: Typecheck web
        run: npx tsc --noEmit
        working-directory: web

      - name: Build web
        run: npm run build --workspace web
