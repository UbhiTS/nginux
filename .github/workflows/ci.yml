name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]   # main is covered by the release workflow's build

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install

      - name: Typecheck server
        run: npm run typecheck --workspace server

      # Real-nginx data-plane test: feed the app's generated config to actual nginx and
      # assert no under-authenticated request reaches a backend (the app's core promise).
      - name: Install nginx
        run: sudo apt-get update && sudo apt-get install -y nginx-full

      - name: Data-plane integration test (real nginx)
        env:
          NGINUX_NGINX_BIN: /usr/sbin/nginx
          NGINUX_REQUIRE_NGINX: "1"   # a missing nginx must FAIL, not silently skip
        run: npm run test:integration --workspace server

      - name: Typecheck web
        run: npx tsc --noEmit
        working-directory: web

      - name: Build web
        run: npm run build --workspace web
