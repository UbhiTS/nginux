name: Release

# On every push to main: bump the patch version (v1.0.0 -> v1.0.1 -> ...),
# build the Docker image, publish it to GHCR, then tag the commit and cut a
# GitHub Release. Uses only the built-in GITHUB_TOKEN — no secrets required.
# v1.0.0 is the baseline release; with no prior tags the first run cuts v1.0.0.
on:
  push:
    branches: [main]

# Avoid two releases racing if pushes land back-to-back.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # create tags + releases
  packages: write   # push to GHCR

jobs:
  # Gate publishing on a green typecheck + web build so broken code never ships.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace server
      - run: npx tsc --noEmit
        working-directory: web
      - run: npm run build --workspace web

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          git fetch --tags --force
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)"
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            ver="${latest#v}"
            major="${ver%%.*}"; rest="${ver#*.}"
            minor="${rest%%.*}"; patch="${rest#*.}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "latest=${latest:-none}" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${latest:-none} -> next: $next"

      - name: Lowercase image repo
        id: image
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/nginux" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.repo }}:${{ steps.version.outputs.next }}
            ${{ steps.image.outputs.repo }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.next }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
          IMAGE: ${{ steps.image.outputs.repo }}
        run: |
          git tag "$NEXT" "${{ github.sha }}"
          git push origin "$NEXT"
          gh release create "$NEXT" \
            --title "$NEXT" \
            --generate-notes \
            --notes "Docker image: \`$IMAGE:$NEXT\` (also tagged \`:latest\`)."
