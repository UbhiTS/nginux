name: Release

# On every push to main: bump the patch version (v0.1.0 -> v0.1.1 -> ...),
# build the Docker image, publish it to GHCR, then tag the commit and cut a
# GitHub Release. Uses only the built-in GITHUB_TOKEN - no secrets required.
# v0.1.0 is the baseline release; with no prior tags the first run cuts v0.1.0.
on:
  push:
    branches: [main]

# Avoid two releases racing if pushes land back-to-back.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # create tags + releases
  packages: write   # push to GHCR

# Run the bundled JS actions (checkout, setup-node, buildx, login, build-push) on
# Node 24 now - they still ship a Node 20 runtime, which GitHub is deprecating and
# will force to Node 24 anyway. Opting in early silences the warning and de-risks
# the cutover. Drop this once the actions default to Node 24 on their own.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Gate publishing on a green typecheck + server tests + web typecheck/tests + web
  # build, so a broken or regressed build never ships. Any red step fails the release.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace server
      - run: npm run test --workspace server
      - run: npx tsc --noEmit
        working-directory: web
      - run: npm run test --workspace web
      - run: npm run build --workspace web

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          git fetch --tags --force
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)"
          # The intended version is the hand-maintained source of truth in
          # version.ts (which the UI shows). Baseline is an auto patch-increment
          # from the latest tag.
          file_ver="v$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' server/src/version.ts | head -n1)"
          if [ -z "$latest" ]; then
            auto="v0.1.0"
          else
            ver="${latest#v}"
            major="${ver%%.*}"; rest="${ver#*.}"
            minor="${rest%%.*}"; patch="${rest#*.}"
            auto="v${major}.${minor}.$((patch + 1))"
          fi
          # Honor version.ts when it declares a version STRICTLY GREATER than the
          # latest tag (lets a deliberate minor/major bump drive the release, and
          # keeps the tag in sync with the UI version); otherwise fall back to the
          # auto patch-increment so a forgotten bump still ships something valid.
          if [ -n "$latest" ] && [ "$file_ver" != "$latest" ] && \
             [ "$(printf '%s\n%s\n' "$latest" "$file_ver" | sort -V | tail -n1)" = "$file_ver" ]; then
            next="$file_ver"
          else
            next="$auto"
          fi
          echo "latest=${latest:-none}" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${latest:-none} · version.ts: $file_ver · auto: $auto -> next: $next"

      - name: Lowercase image repo
        id: image
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/nginux" >> "$GITHUB_OUTPUT"

      # QEMU lets the amd64 runner cross-build the arm64 image (Apple Silicon,
      # Raspberry Pi, ARM NAS) so the published image is multi-arch.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.repo }}:${{ steps.version.outputs.next }}
            ${{ steps.image.outputs.repo }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.next }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
          IMAGE: ${{ steps.image.outputs.repo }}
        run: |
          git tag "$NEXT" "${{ github.sha }}"
          git push origin "$NEXT"
          # Use the curated, version-controlled notes and append the version-specific
          # image line, so every release ships a real description instead of an empty body.
          {
            cat RELEASE_NOTES.md
            echo ""
            echo "---"
            echo ""
            echo "**Docker image:** \`$IMAGE:$NEXT\` (also tagged \`:latest\`)."
          } > "$RUNNER_TEMP/release-notes.md"
          gh release create "$NEXT" \
            --title "$NEXT" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
