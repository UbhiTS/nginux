name: Release

# On every push to main: bump the patch version (v0.1.0 -> v0.1.1 -> ...),
# build the Docker image, publish it to GHCR, then tag the commit and cut a
# GitHub Release. Uses only the built-in GITHUB_TOKEN - no secrets required.
# v0.1.0 is the baseline release; with no prior tags the first run cuts v0.1.0.
on:
  push:
    branches: [main]

# Avoid two releases racing if pushes land back-to-back.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # create tags + releases
  packages: write   # push to GHCR

# Run the bundled JS actions (checkout, setup-node, buildx, login, build-push) on
# Node 24 now - they still ship a Node 20 runtime, which GitHub is deprecating and
# will force to Node 24 anyway. Opting in early silences the warning and de-risks
# the cutover. Drop this once the actions default to Node 24 on their own.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Gate publishing on a green typecheck + web build so broken code never ships.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace server
      - run: npx tsc --noEmit
        working-directory: web
      - run: npm run build --workspace web

  release:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      next: ${{ steps.version.outputs.next }}
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          git fetch --tags --force
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)"
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            ver="${latest#v}"
            major="${ver%%.*}"; rest="${ver#*.}"
            minor="${rest%%.*}"; patch="${rest#*.}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "latest=${latest:-none}" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${latest:-none} -> next: $next"

      - name: Lowercase image repo
        id: image
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/nginux" >> "$GITHUB_OUTPUT"

      # QEMU lets the amd64 runner cross-build the arm64 image (Apple Silicon,
      # Raspberry Pi, ARM NAS) so the published image is multi-arch.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.repo }}:${{ steps.version.outputs.next }}
            ${{ steps.image.outputs.repo }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.next }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
          IMAGE: ${{ steps.image.outputs.repo }}
        run: |
          git tag "$NEXT" "${{ github.sha }}"
          git push origin "$NEXT"
          gh release create "$NEXT" \
            --title "$NEXT" \
            --generate-notes \
            --notes "Docker image: \`$IMAGE:$NEXT\` (also tagged \`:latest\`)."

  # Build the Linux AppImage and attach it to the release just cut. This lives in
  # the release workflow (not a standalone one) because a tag pushed by the
  # release job's GITHUB_TOKEN would NOT trigger a separate `on: push: tags`
  # workflow (GitHub's anti-recursion rule). Docker stays the primary artifact;
  # this just adds a self-contained, distro-agnostic desktop build.
  appimage:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Build the web UI, then reduce to production deps so the bundled control
      # plane carries just what it needs at runtime.
      - name: Build control plane payload
        run: |
          npm ci
          npm run build --workspace web
          npm ci --omit=dev
          mkdir -p desktop/payload/web
          cp -R server      desktop/payload/server
          cp -R web/dist     desktop/payload/web/dist
          cp -R node_modules desktop/payload/node_modules
          rm -rf desktop/payload/server/node_modules desktop/payload/server/data

      # Bundle a real Node 24 runtime so the server runs with node:sqlite +
      # type-stripping regardless of Electron's own Node version.
      - name: Vendor Node runtime (linux-x64)
        run: |
          mkdir -p desktop/runtime
          url="https://nodejs.org/dist/v24.15.0/node-v24.15.0-linux-x64.tar.gz"
          curl -fsSL "$url" -o /tmp/node.tar.gz
          tar -xzf /tmp/node.tar.gz -C /tmp
          cp "/tmp/node-v24.15.0-linux-x64/bin/node" desktop/runtime/node
          chmod +x desktop/runtime/node

      - name: Build AppImage
        working-directory: desktop
        run: |
          npm install
          npx electron-builder --linux AppImage --x64 --publish never

      - name: Attach AppImage to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ needs.release.outputs.next }}
        run: |
          mkdir -p dist-out
          find desktop/out -maxdepth 1 -type f -name '*.AppImage' -exec cp {} dist-out/ \;
          ls -la dist-out
          gh release upload "$NEXT" dist-out/* --clobber
