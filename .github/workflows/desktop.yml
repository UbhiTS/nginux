name: Desktop installers

# Builds native installers - macOS .dmg (Intel + Apple Silicon), Linux .AppImage
# and .deb - by wrapping the control plane in Electron and packaging with
# electron-builder on the matching runner. Fires when a release tag is cut (so
# the installers attach to that GitHub Release), or on demand.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  NODE_VERSION: "24.15.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13      # Intel
            target: mac
            arch: x64
            node_plat: darwin-x64
          - os: macos-14      # Apple Silicon
            target: mac
            arch: arm64
            node_plat: darwin-arm64
          - os: ubuntu-latest # AppImage + deb
            target: linux
            arch: x64
            node_plat: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Build the web UI, then reduce the workspace to production deps only so the
      # bundled control plane carries just what it needs at runtime.
      - name: Build control plane payload
        run: |
          npm ci
          npm run build --workspace web
          npm ci --omit=dev
          mkdir -p desktop/payload/web
          cp -R server          desktop/payload/server
          cp -R web/dist         desktop/payload/web/dist
          cp -R node_modules     desktop/payload/node_modules
          rm -rf desktop/payload/server/node_modules desktop/payload/server/data

      # Bundle a real Node 24 runtime for the target so the server runs with
      # node:sqlite + type-stripping regardless of Electron's own Node version.
      - name: Vendor Node runtime (${{ matrix.node_plat }})
        run: |
          mkdir -p desktop/runtime
          url="https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-${{ matrix.node_plat }}.tar.gz"
          echo "Downloading $url"
          curl -fsSL "$url" -o /tmp/node.tar.gz
          tar -xzf /tmp/node.tar.gz -C /tmp
          cp "/tmp/node-v${NODE_VERSION}-${{ matrix.node_plat }}/bin/node" desktop/runtime/node
          chmod +x desktop/runtime/node

      - name: Build installer
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned for now (Gatekeeper/Notarize later)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install
          npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never

      - name: Collect artifacts
        run: |
          mkdir -p dist-out
          find desktop/out -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \) -exec cp {} dist-out/ \;
          ls -la dist-out

      - uses: actions/upload-artifact@v4
        with:
          name: nginux-${{ matrix.target }}-${{ matrix.arch }}
          path: dist-out/*
          if-no-files-found: error

      # When triggered by a release tag, attach the installers to that release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist-out/* --clobber
