name: Desktop installer (Linux AppImage)

# Builds a single Linux .AppImage by wrapping the control plane in Electron and
# packaging with electron-builder. AppImage is distro-agnostic and self-contained
# (no install, no per-distro packaging). Fires when a release tag is cut (so the
# AppImage attaches to that GitHub Release), or on demand.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  NODE_VERSION: "24.15.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Build the web UI, then reduce the workspace to production deps only so the
      # bundled control plane carries just what it needs at runtime.
      - name: Build control plane payload
        run: |
          npm ci
          npm run build --workspace web
          npm ci --omit=dev
          mkdir -p desktop/payload/web
          cp -R server      desktop/payload/server
          cp -R web/dist     desktop/payload/web/dist
          cp -R node_modules desktop/payload/node_modules
          rm -rf desktop/payload/server/node_modules desktop/payload/server/data

      # Bundle a real Node 24 runtime so the server runs with node:sqlite +
      # type-stripping regardless of Electron's own Node version.
      - name: Vendor Node runtime (linux-x64)
        run: |
          mkdir -p desktop/runtime
          url="https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz"
          curl -fsSL "$url" -o /tmp/node.tar.gz
          tar -xzf /tmp/node.tar.gz -C /tmp
          cp "/tmp/node-v${NODE_VERSION}-linux-x64/bin/node" desktop/runtime/node
          chmod +x desktop/runtime/node

      - name: Build AppImage
        working-directory: desktop
        run: |
          npm install
          npx electron-builder --linux AppImage --x64 --publish never

      - name: Collect artifact
        run: |
          mkdir -p dist-out
          find desktop/out -maxdepth 1 -type f -name '*.AppImage' -exec cp {} dist-out/ \;
          ls -la dist-out

      - uses: actions/upload-artifact@v4
        with:
          name: nginux-linux-appimage
          path: dist-out/*
          if-no-files-found: error

      # When triggered by a release tag, attach the AppImage to that release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist-out/* --clobber
