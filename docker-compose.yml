# NginUX - runs anywhere Docker runs (Windows, Linux, NAS, macOS).
#   docker compose up -d   →   UI at http://localhost:4600
services:
  nginux:
    # Pull the published image from GitHub Container Registry (public, no login).
    image: ghcr.io/ubhits/nginux:latest
    # To build from source instead, comment the line above and uncomment:
    # build: .
    container_name: nginux
    restart: unless-stopped
    ports:
      - "4600:4600" # control-plane UI + API
      - "80:80" # proxied HTTP traffic (data plane)
      - "443:443" # proxied HTTPS traffic (data plane)
    volumes:
      - nginux-data:/data # sqlite db, generated nginx config, certs
    environment:
      - LOG_LEVEL=info
      # By default NginUX runs as whoever owns the mounted data directory, so
      # everything it writes is owned by your host user (manageable over SMB / a
      # NAS file browser) with no configuration. Uncomment to force a specific
      # user instead (check yours with `id`); set both to 0 to run as root.
      # - PUID=1000
      # - PGID=1000
      # Trust X-Forwarded-For only from loopback (the bundled nginx's auth
      # subrequests), so real client IPs are recorded without letting a direct
      # :4600 client spoof them. Keep :4600 on the LAN - never port-forward it to
      # the internet (only 80/443 should face the internet).
      - NGINUX_TRUST_PROXY=true
      # Set a strong admin password on first run (else default is admin/admin):
      # - NGINUX_ADMIN_PASSWORD=change-me-to-something-strong
    # Drop all Linux capabilities, then add back only what's needed to bind
    # :80/:443 and let nginx manage its workers - big blast-radius reduction.
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID, DAC_OVERRIDE, KILL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4600/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginux-data:
