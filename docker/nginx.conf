user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;            # hide nginx version (security)
    client_max_body_size 0;       # per-host limits come from presets

    # Shared per-IP rate-limit zone (hosts opt in with limit_req).
    limit_req_zone $binary_remote_addr zone=nginux_per_ip:10m rate=10r/s;

    # Shared per-IP connection zone (hosts opt in with limit_conn).
    limit_conn_zone $binary_remote_addr zone=nginux_conn:10m;

    # JSON access log consumed by the NginUX metrics pipeline.
    log_format nginux_json escape=json
      '{"time":"$time_iso8601","host":"$host","method":"$request_method",'
      '"path":"$uri","status":$status,"bytes":$body_bytes_sent,'
      '"ip":"$remote_addr","ms":$request_time,"ua":"$http_user_agent"}';
    access_log /data/logs/access.log nginux_json;
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # A catch-all so nginx is valid even before any host is configured,
    # and so unknown domains don't fall through to a real service.
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # Auto + manual IP bans (fail2ban-style), applied to all hosts.
    include /data/nginx/banned.conf;

    # NginUX-generated per-host server blocks live here (mounted volume).
    include /data/nginx/conf.d/*.conf;
}

# L4 (TCP/UDP) stream proxies generated by NginUX.
stream {
    log_format nginux_stream '{"time":"$time_iso8601","proto":"$protocol","ip":"$remote_addr","status":$status,"bytes":$bytes_sent,"ms":$session_time}';
    access_log /data/logs/stream.log nginux_stream;
    include /data/nginx/stream.d/*.conf;
}
