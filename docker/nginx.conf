# Load the L4 stream module (TCP/UDP/SNI proxies). On Alpine this ships in the
# separate nginx-mod-stream package; without this load_module the stream {} block
# below is an "unknown directive" and the whole config fails to validate.
load_module /usr/lib/nginx/modules/ngx_stream_module.so;

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;       # don't let fd limits bottleneck connections
pid /run/nginx.pid;
# File-based (not /dev/stderr) so `nginx -t` under a piped stdout still validates.
error_log /data/logs/error.log warn;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    server_tokens off;            # hide nginx version (security)
    client_max_body_size 50m;     # sane default; hosts may raise it explicitly
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;

    # Compress text responses (perf).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Safe TLS floor for any terminated host (per-host blocks may add more).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Shared per-IP rate-limit zone (hosts opt in with limit_req).
    limit_req_zone $binary_remote_addr zone=nginux_per_ip:10m rate=10r/s;
    limit_req_status 429;

    # Shared per-IP connection zone (hosts opt in with limit_conn).
    limit_conn_zone $binary_remote_addr zone=nginux_conn:10m;

    # Country-lock variable. Hosts with "Only allow my country" emit
    # `if ($nginux_allowed_country = 0) { return 403; }`, so this must always be
    # defined or nginx rejects the whole config. Defaults to 1 (allow everyone);
    # real per-country enforcement activates when a GeoIP database is connected.
    geo $nginux_allowed_country { default 1; }

    # JSON access log consumed by the NginUX metrics pipeline.
    log_format nginux_json escape=json
      '{"time":"$time_iso8601","host":"$host","method":"$request_method",'
      '"path":"$uri","status":$status,"bytes":$body_bytes_sent,'
      '"bytes_in":$request_length,'
      '"ip":"$remote_addr","ms":$request_time,"ua":"$http_user_agent"}';
    # Log to files on the data volume — NOT /dev/stdout. /dev/stdout works for
    # the main nginx process but `nginx -t` is spawned by the control plane with
    # a piped stdout, and reopening that pipe by path fails (ENXIO), which would
    # break every config validation. The access log here feeds the metrics
    # pipeline; `docker logs` still shows the control plane + entrypoint output.
    access_log /data/logs/access.log nginux_json;

    # Catch-all so nginx is valid before any host exists and unknown domains
    # don't fall through to a real service — on both HTTP and HTTPS (so unknown
    # SNI gets the bootstrap cert, not the first real host's cert).
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate     /data/nginx/selfsigned.crt;
        ssl_certificate_key /data/nginx/selfsigned.key;
        ssl_reject_handshake on;
        return 444;
    }

    # Auto + manual IP bans (fail2ban-style), applied to all hosts.
    include /data/nginx/banned.conf;

    # NginUX-generated per-host server blocks live here (mounted volume).
    include /data/nginx/conf.d/*.conf;
}

# L4 (TCP/UDP) stream proxies generated by NginUX.
stream {
    log_format nginux_stream '{"time":"$time_iso8601","proto":"$protocol","ip":"$remote_addr","status":$status,"bytes":$bytes_sent,"ms":$session_time}';
    access_log /data/logs/stream.log nginux_stream;
    include /data/nginx/stream.d/*.conf;
}
